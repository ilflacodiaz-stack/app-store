<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Open Alfonso's personal restaurant favorites map.">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>Tastes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; background: #0a0a0a; overflow: hidden; }
  iframe { border: 0; width: 100%; height: 100%; display: block; }

  /* Floating "back to apps" chip */
  .back {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    left: 12px;
    z-index: 10;
    display: flex; align-items: center; gap: 6px;
    background: rgba(20,20,20,0.72);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    color: #f0f0f0; text-decoration: none;
    font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 8px 12px; border-radius: 999px;
    border: 1px solid #2a2a2a;
  }
  .back:active { background: rgba(40,40,40,0.9); }

  /* Loading state shown until the iframe paints */
  #loading {
    position: fixed; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: #0a0a0a; color: #888;
    font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .spinner {
    width: 26px; height: 26px; border: 3px solid #2a2a2a;
    border-top-color: #8b5cf6; border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <script>window.location.replace("https://favorites-map.vercel.app/");</script>
  <a class="back" href="/">‹ Apps</a>

  <div id="loading">
    <div class="spinner"></div>
    <span>Loading Tastes…</span>
  </div>

  <iframe
    id="app"
    src="https://favorites-map.vercel.app"
    allow="geolocation; clipboard-write"
    referrerpolicy="no-referrer-when-downgrade"
    onload="document.getElementById('loading').style.display='none'"></iframe>
</body>
</html>
